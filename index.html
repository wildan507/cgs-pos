<!DOCTYPE html>
<html>
<head>
  <title>CGS POS</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at top, #1a1a1a, #000000);
      color: #e5e5e5;
    }

    .sidebar {
      background: linear-gradient(180deg, #0a0a0a, #111);
      border-right: 1px solid rgba(255,215,0,0.2);
    }

    .card {
      background: rgba(20,20,20,0.7);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(255,215,0,0.15);
      box-shadow: 0 10px 40px rgba(255,215,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 50px rgba(255,215,0,0.2);
    }

    .btn {
      border-radius: 12px;
      background: linear-gradient(135deg, #FFD700, #C9A000);
      color: black;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255,215,0,0.6);
    }

    .menu-btn {
      transition: 0.2s;
    }

    .menu-btn:hover {
      color: gold;
      transform: translateX(4px);
    }

    input, select {
      width: 100%;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,215,0,0.2);
      color: #fff;
      border-radius: 8px;
      padding: 6px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: gold;
      box-shadow: 0 0 8px rgba(255,215,0,0.5);
    }

    thead {
      background: linear-gradient(90deg, #111, #222);
      color: gold;
    }

    tbody tr:hover {
      background: rgba(255,215,0,0.05);
    }

    #toast {
      background: rgba(0,0,0,0.8);
      border-left: 4px solid gold;
      box-shadow: 0 0 15px rgba(255,215,0,0.4);
    }

    /* tombol edit (biru neon) */
.btn-edit {
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  box-shadow: 0 0 8px rgba(0,198,255,0.6);
  transition: 0.2s;
}

.btn-edit:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0,198,255,1);
}

/* tombol hapus (merah neon) */
.btn-delete {
  background: linear-gradient(135deg, #ff4b2b, #ff0000);
  box-shadow: 0 0 8px rgba(255,0,0,0.6);
  transition: 0.2s;
}

.btn-delete:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(255,0,0,1);
}

button {
  cursor: pointer;
}
  </style>
</head>

<body>

<div class="flex">

  <!-- SIDEBAR -->
  <div class="w-48 h-screen p-4 sidebar">
    <h2 class="font-bold mb-4 text-yellow-400">Menu</h2>

    <button onclick="showMenu('kasir')" class="block mb-2 menu-btn">Kasir</button>
    <button onclick="showMenu('produk')" class="block mb-2 menu-btn">Produk</button>
    <button onclick="showMenu('laporan')" class="block mb-2 menu-btn">Laporan</button>
    <button onclick="showMenu('opname')" class="block mb-2 menu-btn">Stok Opname</button>
    <button onclick="showMenu('supplier')" class="block mb-2 menu-btn">Supplier</button>
    <button onclick="showMenu('input')" class="block mb-2 menu-btn">Input</button>
  </div>

  <!-- CONTENT -->
  <div class="flex-1 p-4">

    <!-- KASIR -->
    <div id="kasir">
      <h1 class="text-xl font-bold mb-3 text-yellow-400">Kasir</h1>

      <button onclick="tambahBaris()" class="px-3 py-1 mb-3 btn">
        + Tambah Item
      </button>

      <div class="card p-3">
        <table class="w-full text-sm table-fixed">
          <thead>
            <tr>
              <th class="w-4/12 p-2 text-left">Barang</th>
              <th class="w-2/12 p-2 text-right">Harga</th>
              <th class="w-2/12 p-2 text-center">Qty</th>
              <th class="w-3/12 p-2 text-right">Total</th>
              <th class="w-1/12"></th>
            </tr>
          </thead>
          <tbody id="cart"></tbody>
        </table>
      </div>

      <h2 class="mt-4 text-xl font-bold text-right text-yellow-400">
        Total: Rp <span id="total">0</span>
      </h2>

      <button onclick="checkout()" class="px-4 py-2 mt-2 float-right btn">
        Bayar
      </button>
    </div>

    <!-- PRODUK -->
    <div id="produk" class="hidden">
      <h1 class="text-xl font-bold mb-3 text-yellow-400">Produk</h1>

      <div class="card p-3 flex gap-2 flex-wrap">
        <input id="nama" placeholder="Nama barang">
        <input id="harga" type="number" placeholder="Harga">
        <input id="hpp" type="number" placeholder="HPP">
        <input id="stok" type="number" placeholder="Stok">
        <button onclick="tambahProduk()" class="btn px-3">Tambah</button>
      </div>

      <h3 class="mt-4 font-semibold">List Produk</h3>
      <div id="listProduk"></div>
    </div>

    <!-- LAPORAN -->
    <div id="laporan" class="hidden">
      <h1 class="text-xl font-bold mb-3 text-yellow-400">Laporan</h1>

      <div class="card p-3 space-y-2">
        <input type="date" id="start">
        <input type="date" id="end">
        <button onclick="loadLaporan()" class="btn px-3">Load</button>

        <div id="hasilLaporan" class="mt-4"></div>
      </div>
    </div>

<!-- STOK OPNAME -->
<div id="opname" class="hidden">
  <h1 class="text-xl font-bold mb-3 text-yellow-400">Stok Opname</h1>

  <div class="card p-3 space-y-3 max-w-md">
    
    <select id="opnameProduk" onchange="pilihProdukOpname()">
      <option value="">Pilih Produk</option>
    </select>

    <input id="stokAwal" placeholder="Stok Saat Ini" readonly>

    <input id="stokBaru" type="number" placeholder="Stok Baru" oninput="hitungSelisih()">

    <input id="selisih" placeholder="Selisih" readonly>

    <button onclick="simpanOpname()" class="btn px-3">
      Simpan
    </button>

  </div>
</div>

<!-- SUPPLIER -->
<div id="supplier" class="hidden">
  <h1 class="text-xl font-bold mb-3 text-yellow-400">Supplier</h1>

  <button onclick="toggleFormSupplier()" class="btn px-3 mb-3">
    + Tambah Supplier
  </button>

  <div id="formSupplier" class="card p-3 mb-3 hidden space-y-2 max-w-md">
    <input id="namaSupplier" placeholder="Nama Supplier">
    <button onclick="tambahSupplier()" class="btn px-3">
      Simpan
    </button>
  </div>

  <input 
    id="searchSupplier" 
    placeholder="Cari supplier..." 
    oninput="renderSupplier()" 
    class="mb-3 max-w-md"
  >

  <div class="card p-3">
    <table class="w-full text-sm">
      <thead>
        <tr>
          <th class="text-left p-2">Nama Supplier</th>
          <th class="text-center p-2">Aksi</th>
        </tr>
      </thead>
      <tbody id="listSupplier"></tbody>
    </table>
  </div>
</div>

<!-- INPUT BARANG -->
<div id="input" class="hidden">
  <h1 class="text-xl font-bold mb-3 text-yellow-400">Input Barang</h1>

  <button 
    onclick="toggleFormInput()" 
    class="px-3 py-1 mb-3 rounded-lg font-bold text-white"
    style="background: linear-gradient(135deg,#001f3f,#0074D9); box-shadow: 0 0 10px #0074D9;">
  >
    + Input Barang
  </button>

  <div id="formInput" class="card p-3 mb-3 hidden space-y-3 max-w-md">

    <!-- PRODUK -->
    <select id="inputProduk" class="w-full"></select>

    <!-- SUPPLIER -->
    <select id="inputSupplier" class="w-full"></select>

    <!-- QTY -->
    <input 
      id="inputQty" 
      type="number" 
      placeholder="Jumlah Barang"
    >

    <button onclick="simpanInput()" class="btn px-3">
      Simpan
    </button>

  </div>

  <div class="card p-3">
    <table class="w-full text-sm">
      <thead>
        <tr>
          <th class="p-2 text-left">Tanggal</th>
          <th class="p-2 text-left">Produk</th>
          <th class="p-2 text-left">Supplier</th>
          <th class="p-2 text-right">Qty</th>
        </tr>
      </thead>
      <tbody id="listInput"></tbody>
    </table>
  </div>
</div>

</div>
</div>

<div id="toast" class="fixed bottom-4 left-4 hidden text-white px-4 py-2 rounded"></div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://xcxqjfwmspdpwhbrevdm.supabase.co",
  "sb_publishable_srKsD-Jo3uGGzs69xAO9_Q_6-M93B0p"
);

let products = [];
let suppliers = [];
let inputLogs = [];
let cart = [];

function rupiah(num){ return Number(num||0).toLocaleString('id-ID'); }

function toast(msg){
  let t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'),2000);
}

function showMenu(menu){
  ['kasir','produk','laporan','opname','supplier','input'].forEach(id=>{
    document.getElementById(id).classList.add('hidden')
  });

  document.getElementById(menu).classList.remove('hidden');

  // ✅ TAMBAHAN PENTING
  if(menu === 'input'){
    renderDropdownInput();
    loadInputLogs();
  }
}

async function loadProducts(){
  let { data, error } = await supabaseClient.from('products').select('*');

  if(error){
    console.error(error);
    toast("Gagal load produk");
    return;
  }

  if(!data) data = [];

  products = data.sort((a,b)=>
    (a.name || "").localeCompare(b.name || "")
  );

  renderListProduk();
  renderDropdownOpname();
}

async function tambahProduk(){
  await supabaseClient.from('products').insert([{
    name: nama.value,
    price: +harga.value || 0,
    stock: +stok.value || 0,
    hpp: +hpp.value || 0
  }]);

  toast("Produk ditambah");
  loadProducts();
}

async function loadSuppliers(){
  let { data, error } = await supabaseClient
    .from('suppliers')
    .select('*');

  if(error){
    console.error(error);
    toast("Gagal load supplier");
    return;
  }

  suppliers = data || [];
  renderSupplier();
}

function renderSupplier() {
  const tbody = document.getElementById('listSupplier');
  const keyword = document.getElementById('searchSupplier').value.toLowerCase();

  tbody.innerHTML = "";

  const filtered = suppliers.filter(s =>
    (s.name || "").toLowerCase().includes(keyword)
  );

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="2">Tidak ada data</td></tr>`;
    return;
  }

  let html = "";

  filtered.forEach(s => {
    html += `
      <tr>
        <td class="p-2">${s.name}</td>
        <td class="p-2 text-center space-x-2">
          
          <button 
            onclick="editSupplier(this)"
            data-id="${s.id}"
            data-name="${s.name}"
            class="px-3 py-1 rounded-lg text-white font-semibold btn-edit">
            Edit
          </button>

          <button 
            onclick="hapusSupplier(this)"
            data-id="${s.id}"
            class="px-3 py-1 rounded-lg text-white font-semibold btn-delete">
            Hapus
          </button>

        </td>
      </tr>
    `;
  });

  tbody.innerHTML = html;
}
async function tambahSupplier(){
  let nama = document.getElementById('namaSupplier').value;

  if(!nama){
    toast("Nama tidak boleh kosong");
    return;
  }

  let { error } = await supabaseClient
    .from('suppliers')
    .insert([{ name: nama }]);

  if(error){
    console.error(error);
    toast("Gagal tambah supplier");
    return;
  }

  toast("Supplier ditambahkan");
  document.getElementById('namaSupplier').value = "";
  loadSuppliers();
}

function hapusSupplier(el) {
  const id = el.dataset.id;

  if (!confirm("Yakin hapus?")) return;

  supabaseClient
    .from('suppliers')
    .delete()
    .eq('id', id)
    .then(({ error }) => {
      if (error) {
        console.error(error);
        toast("Gagal hapus");
        return;
      }

      toast("Supplier dihapus");
      loadSuppliers();
    });
}

function editSupplier(el) {
  const id = el.dataset.id;
  const namaLama = el.dataset.name;

  let namaBaru = prompt("Edit nama:", namaLama);
  if (!namaBaru) return;

  supabaseClient
    .from('suppliers')
    .update({ name: namaBaru })
    .eq('id', id)
    .then(({ error }) => {
      if (error) {
        console.error(error);
        toast("Gagal edit");
        return;
      }

      toast("Supplier diupdate");
      loadSuppliers();
    });
}

function toggleFormSupplier(){
  let f = document.getElementById('formSupplier');
  f.classList.toggle('hidden');
}

function renderListProduk(){
  let div = document.getElementById('listProduk');
  div.innerHTML = "";

  if(products.length === 0){
    div.innerHTML = `<div class="text-gray-400">Tidak ada produk</div>`;
    return;
  }

  products.forEach(p=>{
    div.innerHTML += `
      <div class="card p-2 mb-2 hover:scale-[1.01]">
        ${p.name} | Rp${rupiah(p.price)} | HPP Rp${rupiah(p.hpp)} | Stok ${p.stock}
      </div>`;
  });
}

function tambahBaris(){
  cart.push({product_id:null,price:0,qty:1,total:0,hpp:0});
  renderCart();
}

function renderCart(){
  let tbody = document.getElementById('cart');
  tbody.innerHTML="";
  let total=0;

  cart.forEach((item,i)=>{
    tbody.innerHTML+=`
      <tr>
        <td class="p-1">
          <select onchange="pilihProduk(${i},this.value)">
            <option value="">Pilih</option>
            ${products.map(p=>`
              <option value="${p.id}" ${String(item.product_id)===String(p.id)?"selected":""}>
                ${p.name}
              </option>`).join("")}
          </select>
        </td>

        <td class="p-1 text-right">
          <input value="${item.price}" onchange="ubahHarga(${i},this.value)">
        </td>

        <td class="p-1 text-center">
          <input value="${item.qty}" onchange="ubahQty(${i},this.value)">
        </td>

        <td class="p-1 text-right">
          <input value="${item.total}" onchange="ubahTotal(${i},this.value)">
        </td>

        <td class="text-center">
          <button onclick="hapusItem(${i})">❌</button>
        </td>
      </tr>`;
    total+=item.total;
  });

  document.getElementById('total').innerText=rupiah(total);
}

function pilihProduk(i,id){
  let p = products.find(x=>String(x.id)===String(id));
  if(!p) return;

  cart[i]={product_id:p.id,price:p.price,qty:1,total:p.price,hpp:p.hpp};
  renderCart();
}

function ubahHarga(i,v){
  cart[i].price=Math.max(0,+v||0);
  cart[i].total=cart[i].price*cart[i].qty;
  renderCart();
}

function ubahQty(i,v){
  cart[i].qty=Math.max(1,+v||1);
  cart[i].total=cart[i].qty*cart[i].price;
  renderCart();
}

function ubahTotal(i,v){
  cart[i].total=Math.max(0,+v||0);
  cart[i].price=cart[i].total/cart[i].qty;
  renderCart();
}

function hapusItem(i){
  cart.splice(i,1);
  renderCart();
}

async function loadLaporan(){
  let start = document.getElementById('start').value;
  let end = document.getElementById('end').value;

  let { data, error } = await supabaseClient
    .from('transaction_items')
    .select(`qty, price, hpp, transactions(created_at)`)
    .gte('transactions.created_at', start)
    .lte('transactions.created_at', end);

  if(error || !data){
    toast("Gagal load laporan");
    return;
  }

  let omset = 0;
  let hppTotal = 0;

  data.forEach(item => {
    omset += item.qty * item.price;
    hppTotal += item.qty * item.hpp;
  });

  let margin = omset - hppTotal;

  document.getElementById('hasilLaporan').innerHTML = `
    <div class="card p-3 mt-3">
      <div>Omset: Rp ${rupiah(omset)}</div>
      <div>HPP: Rp ${rupiah(hppTotal)}</div>
      <div class="text-yellow-400 font-bold">Margin: Rp ${rupiah(margin)}</div>
    </div>
  `;
}

async function checkout(){

  if(cart.length === 0){
    toast("Cart kosong");
    return;
  }

  try {

    let { data, error } = await supabaseClient.rpc('checkout_transaction', {
      p_items: cart
    });

    if(error){
      throw error;
    }

    console.log("ID Transaksi:", data);

    cart=[];
    await loadProducts();
    renderCart();
    toast("Transaksi berhasil");

  } catch(e){
    console.error(e);
    toast(e.message || "Error saat checkout");
  }
}

function renderDropdownOpname(){
  let select = document.getElementById('opnameProduk');
  select.innerHTML = `<option value="">Pilih Produk</option>`;

  products.forEach(p=>{
    select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
  });
}

function pilihProdukOpname(){
  let id = document.getElementById('opnameProduk').value;
  let p = products.find(x=>String(x.id)===String(id));
  if(!p) return;

  document.getElementById('stokAwal').value = p.stock;
  document.getElementById('stokBaru').value = "";
  document.getElementById('selisih').value = "";
}

function hitungSelisih(){
  let awal = +document.getElementById('stokAwal').value || 0;
  let baru = +document.getElementById('stokBaru').value || 0;

  document.getElementById('selisih').value = baru - awal;
}

async function simpanOpname(){
  let id = document.getElementById('opnameProduk').value;
  let baru = +document.getElementById('stokBaru').value || 0;

  if(!id){
    toast("Pilih produk dulu");
    return;
  }

  let { error } = await supabaseClient
    .from('products')
    .update({ stock: baru })
    .eq('id', id);

  if(error){
    console.error(error);
    toast("Gagal update stok");
    return;
  }

  toast("Stok berhasil diupdate");
  loadProducts();

  document.getElementById('stokAwal').value = "";
  document.getElementById('stokBaru').value = "";
  document.getElementById('selisih').value = "";
}

async function loadInputLogs(){
  let { data, error } = await supabaseClient
    .from('input_logs')
    .select('*, products(name), suppliers(name)')
    .order('created_at', { ascending: false });

  if(error){
    console.error(error);
    toast("Gagal load input");
    return;
  }

  inputLogs = data || [];
  renderInputLogs();
}

function renderInputLogs(){
  let tbody = document.getElementById('listInput');
  tbody.innerHTML = "";

  if(inputLogs.length === 0){
    tbody.innerHTML = `<tr><td colspan="4">Belum ada data</td></tr>`;
    return;
  }

  inputLogs.forEach(i=>{
    tbody.innerHTML += `
      <tr>
        <td class="p-2">${new Date(i.created_at).toLocaleString()}</td>
        <td class="p-2">${i.products?.name || '-'}</td>
        <td class="p-2">${i.suppliers?.name || '-'}</td>
        <td class="p-2 text-right">${i.qty}</td>
      </tr>
    `;
  });
}

function renderDropdownInput(){
  let p = document.getElementById('inputProduk');
  let s = document.getElementById('inputSupplier');

  p.innerHTML = `<option value="">Pilih Produk</option>`;
  s.innerHTML = `<option value="">Pilih Supplier</option>`;

  products.forEach(x=>{
    p.innerHTML += `<option value="${x.id}">${x.name}</option>`;
  });

  suppliers.forEach(x=>{
    s.innerHTML += `<option value="${x.id}">${x.name}</option>`;
  });
}

function toggleFormInput(){
  document.getElementById('formInput').classList.toggle('hidden');
}

async function simpanInput(){
  let product_id = document.getElementById('inputProduk').value;
  let supplier_id = document.getElementById('inputSupplier').value;
  let qty = +document.getElementById('inputQty').value || 0;

  if(!product_id || !supplier_id || qty <= 0){
    toast("Lengkapi data");
    return;
  }

  // simpan log
  let { error } = await supabaseClient
    .from('input_logs')
    .insert([{ product_id, supplier_id, qty }]);

  if(error){
    console.error(error);
    toast("Gagal simpan");
    return;
  }

  // update stok
  let product = products.find(x=>String(x.id)===String(product_id));

  await supabaseClient
    .from('products')
    .update({ stock: (product.stock || 0) + qty })
    .eq('id', product_id);

  toast("Berhasil input barang");

  loadProducts();
  loadInputLogs();

  document.getElementById('inputQty').value = "";
}

loadProducts();
loadSuppliers();
loadInputLogs();

// isi dropdown setelah data siap
setTimeout(()=>{
  renderDropdownInput();
},500);

</script>

</body>
</html>
